# INDEX.yaml — sitemap machine-readable do projeto Aferê
#
# Pra quê: hook em SessionStart lê este arquivo + .agent/CURRENT.md (US ativo)
# e injeta no contexto SÓ o subset necessário via @path, evitando carregar
# 80+ docs em todo turno.
#
# Schema por entrada:
#   path: caminho a partir da raiz do repo
#   familia: 0..8 ou "extra" / "raiz"
#   prio: mvp | proximo | lazy
#   status: stable | draft | stub | vazio
#   tokens_estimados: chars / 4 (heurística)
#   carrega_quando: lista de gatilhos pra hook decidir incluir
#
# Gatilhos disponíveis (controlado):
#   - "sempre" — todo turno (só pros canônicos)
#   - "tocar:<glob>" — quando agente vai tocar arquivo que bate em glob
#   - "modulo:<nome>" — quando US ativo é desse módulo
#   - "dominio:<nome>" — quando US ativo é desse domínio
#   - "tarefa:<tipo>" — discovery, arquitetura, seguranca, conformidade, operacao, governanca, produto
#   - "evento:<tipo>" — go-live, incidente, dr, drill, pre-commit, pre-merge
#   - "sob_pedido" — só se agente pedir via @path explícito

version: 3
ultima_atualizacao: 2026-05-17 (noite +6h — v7 adicionou 5 domínios + 19 módulos)

