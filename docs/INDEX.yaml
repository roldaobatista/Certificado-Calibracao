    tokens_estimados_modulo: 13000  # workflow NC
    carrega_quando: ["modulo:qualidade", "tarefa:auditoria"]

# =========================================================================
# Tetos por arquivo (D2/D3 da constituição)
# =========================================================================

tetos:
  CLAUDE.md: 5000           # ~150 linhas
  AGENTS.md: 8000           # ~250 linhas
  REGRAS-INEGOCIAVEIS.md: 4000   # ~120 linhas (cresce com IDs)
  .agent/CURRENT.md: 500    # ~10 linhas
  prd.md: 5000
  glossario-roldao.md: 5000
  # Hook context-budget.sh (a calibrar) tokeniza e emite warning acima do teto.

# =========================================================================
# Resumo
# =========================================================================

resumo:
  total_docs: 270  # estimativa pós-v7 (75 v6 + ~152 módulos + 10 domínio README/personas + 5 ADRs/INVs/OPs editados)
  tokens_estimados_total: 415000  # crescimento ~93% vs v6
  tokens_carregam_sempre: 13000  # canônicos não cresceram
  observacao: |
    Crescimento grande na v7 (2026-05-17 noite +6h): 5 domínios + 19 módulos × 8 docs cada.
    "carrega: sempre" continua ≤ 15k tokens (canônicos não mudaram).
    Hook context-budget.sh emite warning quando canônicos passam do teto.
    Demais docs entram sob demanda via @path quando hook injetor processar gatilhos.
    Hook injetor agora é MAIS NECESSÁRIO — sem ele, agente que toca "modulo:os"
    teria que carregar manual 8 docs. Implementar hook injetor virou prioridade.
    Wave A (~10 módulos prio:mvp) ainda cabe folgado num contexto normal (~120k tokens).
    Wave B+C adicionam mais ~50k.
