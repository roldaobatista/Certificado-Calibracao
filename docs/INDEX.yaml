    pasta: docs/dominios/operacao/modulos/os/
    prio: mvp  # OP3 — Wave A
    status: draft
    tokens_estimados_modulo: 14000  # maior — INV-027 máquina estados detalhada
    carrega_quando: ["modulo:os", "dominio:operacao"]

  - modulo: chamados
