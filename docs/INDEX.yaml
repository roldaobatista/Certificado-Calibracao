# `modelo-de-dominio.md`, `contratos/ui.md`, `contratos/api.md`, `contratos/exports.md`.
# Gatilho de carga: ["modulo:<nome>"] + atalho por tipo de tarefa
# (`tarefa:produto` carrega prd.md; `tarefa:ux` carrega ui.md + personas; etc.)

modulos:
  # --- Comercial ---
  - modulo: clientes
    pasta: docs/dominios/comercial/modulos/clientes/
    docs: [glossario, prd, personas, metricas, modelo-de-dominio, contratos/ui, contratos/api, contratos/exports]
    prio: mvp  # Wave A (F-C cliente master)
    status: draft
    tokens_estimados_modulo: 12000
    carrega_quando: ["modulo:clientes", "dominio:comercial"]

  - modulo: orcamentos
    pasta: docs/dominios/comercial/modulos/orcamentos/
    docs: [glossario, prd, personas, metricas, modelo-de-dominio, contratos/ui, contratos/api, contratos/exports]
    prio: mvp  # OP15 — Wave A (s15.1, s15.4) + Wave B (s15.2, s15.3)
    status: draft
    tokens_estimados_modulo: 12000
    carrega_quando: ["modulo:orcamentos"]

  - modulo: crm
    pasta: docs/dominios/comercial/modulos/crm/
    docs: [glossario, prd, personas, metricas, modelo-de-dominio, contratos/ui, contratos/api, contratos/exports]
    prio: proximo  # OP5 — Wave B
    status: draft
    tokens_estimados_modulo: 12000
    carrega_quando: ["modulo:crm"]

  - modulo: contratos
    pasta: docs/dominios/comercial/modulos/contratos/
    docs: [glossario, prd, personas, metricas, modelo-de-dominio, contratos/ui, contratos/api, contratos/exports]
    prio: proximo  # OP1 — Wave B
    status: draft
    tokens_estimados_modulo: 12000
    carrega_quando: ["modulo:contratos"]

  # --- Operação ---
