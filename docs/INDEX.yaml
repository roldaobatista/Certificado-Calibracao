    status: draft
    tokens_estimados_modulo: 8000
    carrega_quando: ["modulo:contas-pagar"]

  - modulo: comissoes
    pasta: docs/dominios/financeiro/modulos/comissoes/
    prio: mvp  # OP4 Wave A (1 fórmula)
    status: draft
    tokens_estimados_modulo: 12000
