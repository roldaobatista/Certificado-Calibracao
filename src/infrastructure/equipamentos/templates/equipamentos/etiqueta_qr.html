{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta de equipamento {{ tag }}</title>
<style>
@page {
    size: 60mm 40mm;
    margin: 2mm;
}
body {
    font-family: "DejaVu Sans", sans-serif;
    font-size: 7pt;
    color: #000;
    margin: 0;
    padding: 0;
}
.etiqueta {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 2mm;
    width: 100%;
    height: 100%;
}
.qr-area {
    width: 32mm;
    height: 32mm;
    flex-shrink: 0;
}
.qr-area img {
    width: 100%;
    height: 100%;
}
.dados {
    flex: 1;
    line-height: 1.15;
    word-break: break-word;
    overflow: hidden;
}
.dados .tag {
    font-size: 11pt;
    font-weight: bold;
    margin-bottom: 1mm;
}
.dados .linha {
    font-size: 6.5pt;
    margin-bottom: 0.5mm;
}
.dados .rodape {
    font-size: 5pt;
    color: #444;
    margin-top: 1mm;
    border-top: 0.2mm solid #999;
    padding-top: 0.5mm;
}
</style>
</head>
<body>
<div class="etiqueta">
    <div class="qr-area">
        <img src="data:image/png;base64,{{ qr_png_base64 }}" alt="QR Code">
    </div>
    <div class="dados">
        <div class="tag">{{ tag }}</div>
        <div class="linha"><strong>NS:</strong> {{ numero_serie }}</div>
        <div class="linha"><strong>{{ fabricante }}</strong></div>
        <div class="linha">{{ modelo }}</div>
        <div class="rodape">{{ tenant_nome }}</div>
    </div>
</div>
</body>
</html>
