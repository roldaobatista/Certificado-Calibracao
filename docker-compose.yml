# Docker Compose para desenvolvimento local (Foundation F-A em diante).
# Sobe: PostgreSQL 16 + aplicacao Django.
# Uso: `docker compose up` no PC do Roldao. Sem deploy remoto.
# Ver memoria project_deploy_so_quando_roldao_quiser.

services:
  db:
    image: postgres:16-alpine
    container_name: afere-db
    restart: unless-stopped
    # Postgres ganha 4GB (default tipico 25%-50% da RAM ja eh boa
    # margem para shared_buffers + work_mem em test load).
    mem_limit: 4g
    mem_reservation: 1g
    shm_size: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afere}
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres_dev_change_in_prod}
      # Passwords das 2 roles app (NOBYPASSRLS) passadas pro init script
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-app_user_dev_change_in_prod}
      APP_MIGRATOR_PASSWORD: ${APP_MIGRATOR_PASSWORD:-app_migrator_dev_change_in_prod}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - afere-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afere-app
    restart: unless-stopped
    # Limites de recursos (2026-05-23) — WSL2 tem 24GB declarados em
    # .wslconfig mas o Docker Desktop estava matando processos do
    # container com exit 137 (SIGKILL) em runs medios de pytest +
    # poetry lock. Sem mem_limit explicito o cgroup default fica muito
    # baixo. 12GB cobre pytest full-suite (~543 testes) + poetry lock +
    # build de dep com sobra. shm_size pra Postgres prepared statements
    # e WeasyPrint render.
    mem_limit: 12g
    mem_reservation: 4g
    shm_size: 1g
    command: >
      sh -c "
        poetry run python manage.py makemigrations --no-input &&
        poetry run python manage.py migrate --database=migrator --no-input &&
        poetry run python manage.py runserver 0.0.0.0:8000
      "
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://${APP_USER:-app_user}:${APP_USER_PASSWORD:-app_user_dev_change_in_prod}@db:5432/${POSTGRES_DB:-afere}
      DATABASE_MIGRATOR_URL: postgres://${APP_MIGRATOR:-app_migrator}:${APP_MIGRATOR_PASSWORD:-app_migrator_dev_change_in_prod}@db:5432/${POSTGRES_DB:-afere}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-secret-do-NOT-use-in-prod-xkF7sNcaZpQ8wR4mY2v}
      DJANGO_DEBUG: "True"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app:cached
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - afere-net

  # Redis adicionado em 2026-05-18 noite por decisao Roldao apos review tech-lead US-EQP-003.
  # Destrava: rate-limit por IP em multi-worker (US-EQP-003), idempotency_keys (US-EQP-004/005),
  # cache compartilhado da ficha 360 se p95 estourar (RBC C5 — medir primeiro).
  # Sem deploy remoto (memoria project_deploy_so_quando_roldao_quiser preservada — so local).
  redis:
    image: redis:7-alpine
    container_name: afere-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      # Porta externa 6380 default (porta 6379 conflita com Redis de
      # outro projeto local — `sistema` MySQL/PHP-MyAdmin). O app
      # acessa via nome `redis:6379` dentro da network afere-net; a
      # porta externa so serve para inspecao via redis-cli local.
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - afere-net

volumes:
  db_data:
    name: afere_db_data
  redis_data:
    name: afere_redis_data

networks:
  afere-net:
    name: afere-net
    driver: bridge
