# .codex/agents/web-ui.toml
# Espelho gerado a partir de .claude/agents/web-ui.md (fonte canônica por AGENTS.md).
# Editar AGENTS.md + .claude/agents/web-ui.md → re-sincronizar (tools/sync-agents.ts).

name = "web-ui"
description = "Next.js SSR/SSG — wizard, back-office, portal, e-mails transacionais"
model = "sonnet"
reference = ".claude/agents/web-ui.md"

[paths]
allowed_write = ["apps/web/**","apps/portal/**"]
blocked_write = ["apps/api/**","apps/android/**","packages/normative-rules/**","packages/engine-uncertainty/**","compliance/**"]

[tools]
read = true
edit = true
write = true
grep = true
glob = true
bash = true
