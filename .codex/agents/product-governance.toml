# .codex/agents/product-governance.toml
# Espelho gerado a partir de .claude/agents/product-governance.md (fonte canônica por AGENTS.md).
# Editar AGENTS.md + .claude/agents/product-governance.md → re-sincronizar (tools/sync-agents.ts).

name = "product-governance"
description = "Gate de merge regulatório; consolida release-norm; sem escrita em código"
model = "opus"
reference = ".claude/agents/product-governance.md"

[paths]
allowed_write = ["compliance/release-norm/**","adr/**"]
blocked_write = ["apps/**","packages/**","evals/**","compliance/normative-packages/**","compliance/validation-dossier/**","compliance/legal-opinions/**","compliance/audits/**","compliance/approved-claims.md"]

[tools]
read = true
edit = true
write = true
grep = true
glob = true
bash = true
