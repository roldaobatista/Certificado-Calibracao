# .codex/agents/legal-counsel.toml
# Espelho gerado a partir de .claude/agents/legal-counsel.md (fonte canônica por AGENTS.md).
# Editar AGENTS.md + .claude/agents/legal-counsel.md → re-sincronizar (tools/sync-agents.ts).

name = "legal-counsel"
description = "Parecer jurídico-regulatório (LGPD, claims, contratos); bloqueia release em risco jurídico alto"
model = "opus"
reference = ".claude/agents/legal-counsel.md"

[paths]
allowed_write = ["compliance/audits/legal/**","compliance/legal-opinions/**"]
blocked_write = ["apps/**","packages/**","evals/**","compliance/normative-packages/**","compliance/validation-dossier/**","compliance/release-norm/**","compliance/approved-claims.md","compliance/audits/metrology/**","compliance/audits/code/**"]

[tools]
read = true
edit = true
write = true
grep = true
glob = true
bash = true
