# .codex/agents/metrology-auditor.toml
# Espelho gerado a partir de .claude/agents/metrology-auditor.md (fonte canônica por AGENTS.md).
# Editar AGENTS.md + .claude/agents/metrology-auditor.md → re-sincronizar (tools/sync-agents.ts).

name = "metrology-auditor"
description = "Pré-auditoria ISO/IEC 17025 e CGCRE; simula auditor real; bloqueia release se encontra não-conformidade"
model = "opus"
reference = ".claude/agents/metrology-auditor.md"

[paths]
allowed_write = ["compliance/audits/metrology/**"]
blocked_write = ["apps/**","packages/**","evals/**","compliance/normative-packages/**","compliance/validation-dossier/**","compliance/release-norm/**","compliance/legal-opinions/**","compliance/approved-claims.md","compliance/audits/legal/**","compliance/audits/code/**"]

[tools]
read = true
edit = true
write = true
grep = true
glob = true
bash = true
