# .codex/agents/db-schema.toml
# Espelho gerado a partir de .claude/agents/db-schema.md (fonte canônica por AGENTS.md).
# Editar AGENTS.md + .claude/agents/db-schema.md → re-sincronizar (tools/sync-agents.ts).

name = "db-schema"
description = "Postgres — multitenancy, RLS, audit log imutável, hash-chain, WORM"
model = "sonnet"
reference = ".claude/agents/db-schema.md"

[paths]
allowed_write = ["packages/db/**","packages/audit-log/**"]
blocked_write = ["apps/**","packages/engine-uncertainty/**","packages/normative-rules/**","packages/copy-lint/**","packages/contracts/**","compliance/audits/**","compliance/release-norm/**"]

[tools]
read = true
edit = true
write = true
grep = true
glob = true
bash = true
