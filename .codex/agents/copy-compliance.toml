# .codex/agents/copy-compliance.toml
# Espelho gerado a partir de .claude/agents/copy-compliance.md (fonte canônica por AGENTS.md).
# Editar AGENTS.md + .claude/agents/copy-compliance.md → re-sincronizar (tools/sync-agents.ts).

name = "copy-compliance"
description = "Lint de claims regulatórios em site, portal, e-mails, docs comerciais; mantém claim-set aprovado"
model = "sonnet"
reference = ".claude/agents/copy-compliance.md"

[paths]
allowed_write = ["packages/copy-lint/**","compliance/approved-claims.md"]
blocked_write = ["apps/**","compliance/release-norm/**","compliance/audits/**","compliance/normative-packages/**"]

[tools]
read = true
edit = true
write = true
grep = true
glob = true
bash = true
