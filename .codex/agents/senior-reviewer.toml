# .codex/agents/senior-reviewer.toml
# Espelho gerado a partir de .claude/agents/senior-reviewer.md (fonte canônica por AGENTS.md).
# Editar AGENTS.md + .claude/agents/senior-reviewer.md → re-sincronizar (tools/sync-agents.ts).

name = "senior-reviewer"
description = "Code review sênior independente em áreas blocker; bloqueia merge em risco arquitetural ou de segurança"
model = "opus"
reference = ".claude/agents/senior-reviewer.md"

[paths]
allowed_write = ["compliance/audits/code/**"]
blocked_write = ["apps/**","packages/**","evals/**","compliance/normative-packages/**","compliance/validation-dossier/**","compliance/release-norm/**","compliance/legal-opinions/**","compliance/approved-claims.md","compliance/audits/metrology/**","compliance/audits/legal/**"]

[tools]
read = true
edit = true
write = true
grep = true
glob = true
bash = true
