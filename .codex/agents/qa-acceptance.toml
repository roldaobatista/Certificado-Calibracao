# .codex/agents/qa-acceptance.toml
# Espelho gerado a partir de .claude/agents/qa-acceptance.md (fonte canônica por AGENTS.md).
# Editar AGENTS.md + .claude/agents/qa-acceptance.md → re-sincronizar (tools/sync-agents.ts).

name = "qa-acceptance"
description = "Testes por AC, fixtures, property tests, evidência no dossiê"
model = "sonnet"
reference = ".claude/agents/qa-acceptance.md"

[paths]
allowed_write = ["evals/**","compliance/validation-dossier/**"]
blocked_write = ["apps/**","packages/**","compliance/release-norm/**","compliance/audits/**","compliance/normative-packages/**"]

[tools]
read = true
edit = true
write = true
grep = true
glob = true
bash = true
