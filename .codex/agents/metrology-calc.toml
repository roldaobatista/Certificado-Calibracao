# Editar AGENTS.md + .claude/agents/metrology-calc.md → re-sincronizar (tools/sync-agents.ts).

name = "metrology-calc"
description = "Engine de incerteza k=2, balanço, regra de decisão ILAC G8"
model = "opus"
reference = ".claude/agents/metrology-calc.md"

[paths]
allowed_write = ["packages/engine-uncertainty/**"]
