# .codex/config.toml — Aferê
#
# Config MÍNIMO que o schema do Codex CLI 2026 aceita.
# As decisões conceituais do harness (budgets, routing, allowlist de agentes,
# hooks, sandbox) estão documentadas em:
#   - AGENTS.md (fonte canônica)
#   - harness/17-multi-tooling.md
#   - .codex/config.design.toml (versão aspiracional original)
#
# Agentes individuais: .codex/agents/*.toml (13 papéis).
# MCP servers: registrados via 'codex mcp add' (ver tools/setup-mcp.md),
#              NÃO declarados aqui (Codex armazena em ~/.codex/).
# Hooks lifecycle: .codex/hooks/*.sh — acionados por lifecycle do Codex.
# Guardrails duros (copy-lint, ownership-lint): rodam via .githooks/pre-commit
# independente da CLI (ver tools/install-hooks.sh).
