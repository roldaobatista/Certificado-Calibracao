name: Required gates

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  required-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.2
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run structural gates
        run: pnpm check:all

      - name: Start Postgres for tenancy gates
        run: docker compose up -d postgres

      - name: Wait for Postgres health
        shell: bash
        run: |
          for attempt in {1..30}; do
            status="$(docker inspect -f '{{.State.Health.Status}}' afere-postgres 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              echo "Postgres is healthy."
              exit 0
            fi
            echo "Waiting for Postgres health (${attempt}/30): ${status:-unknown}"
            sleep 2
          done
          docker compose ps postgres
          docker logs afere-postgres
          exit 1

      - name: Show Postgres status
        run: docker compose ps postgres

      - name: Run tenancy gates
        run: pnpm test:tenancy
