name: Required gates

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  required-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.2
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run structural gates
        run: pnpm check:all

      - name: Start Postgres for tenancy gates
        run: docker compose up -d postgres

      - name: Wait for Postgres health
        shell: bash
        run: |
          for attempt in {1..30}; do
            status="$(docker inspect -f '{{.State.Health.Status}}' afere-postgres 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              echo "Postgres is healthy."
              exit 0
            fi
            echo "Waiting for Postgres health (${attempt}/30): ${status:-unknown}"
            sleep 2
          done
          docker compose ps postgres
          docker logs afere-postgres
          exit 1

      - name: Show Postgres status
        run: docker compose ps postgres

      - name: Run tenancy gates
        run: pnpm test:tenancy

      - name: Generate verification issue drafts
        if: ${{ failure() }}
        shell: bash
        run: |
          mkdir -p .github-artifacts
          if ! pnpm verification-cascade:issue-drafts -- --write --json > .github-artifacts/verification-issue-drafts.json; then
            echo "[]" > .github-artifacts/verification-issue-drafts.json
          fi
          cat .github-artifacts/verification-issue-drafts.json

      - name: Create or update verification issues
        if: ${{ failure() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.github-artifacts/verification-issue-drafts.json';

            if (!fs.existsSync(path)) {
              core.info('No verification issue draft artifact found.');
              return;
            }

            const drafts = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (!Array.isArray(drafts) || drafts.length === 0) {
              core.info('No verification issue drafts to publish.');
              return;
            }

            for (const draft of drafts) {
              const existing = await github.paginate(
                github.rest.issues.listForRepo,
                {
                  ...context.repo,
                  state: 'open',
                  labels: Array.isArray(draft.labels) ? draft.labels.join(',') : '',
                  per_page: 100,
                },
                (response) => response.data,
              );

              const duplicate = existing.find((issue) => issue.title === draft.title);
              if (duplicate) {
                core.info(`Verification issue already open: #${duplicate.number} ${duplicate.title}`);
                continue;
              }

              const created = await github.rest.issues.create({
                ...context.repo,
                title: draft.title,
                body: draft.body,
                labels: Array.isArray(draft.labels) ? draft.labels : [],
              });

              core.info(`Created verification issue #${created.data.number}: ${created.data.title}`);
            }
