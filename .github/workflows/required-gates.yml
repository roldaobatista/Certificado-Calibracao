name: Required gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  required-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run structural gates
        run: pnpm check:all

      - name: Start Postgres for tenancy gates
        run: docker compose up -d postgres

      - name: Show Postgres status
        run: docker compose ps postgres

      - name: Run tenancy gates
        run: pnpm test:tenancy
