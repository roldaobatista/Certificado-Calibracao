# Auditor de Segurança — camada B do híbrido (servidor)
# Roda em cada PR. Prompt versionado em docs/governanca/auditor-seguranca-prompt.md (v1.0.0).
# Bloqueia merge se devolver FAIL.
#
# Pré-requisito: secret ANTHROPIC_API_KEY configurado nas settings do repo.
# Atribua o secret apenas a usuários com aprovação do Roldão (CODEOWNERS).

name: auditor-seguranca

on:
  pull_request:
    paths:
      - 'financeiro/**'
      - 'auth/**'
      - 'tenant/**'
      - 'kms/**'
      - '**/migrations/**'
      - '.claude/hooks/**'
      - '.github/workflows/**'
      - 'REGRAS-INEGOCIAVEIS.md'

jobs:
  auditor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2 — pin SHA SUPPLY-1 Onda PRE-A.4
        with:
          fetch-depth: 0

      - name: Diff vs base
        id: diff
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}...HEAD" > /tmp/diff.patch
          echo "diff_size=$(wc -l < /tmp/diff.patch)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0 — pin SHA SUPPLY-1 Onda PRE-A.4
        with:
          python-version: '3.12'

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Invocar Auditor de Segurança
        id: auditor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python <<'EOF'
          import os, sys, pathlib
          from anthropic import Anthropic

          client = Anthropic()
          root = pathlib.Path(".")

          system_prompt = (root / "docs/governanca/auditor-seguranca-prompt.md").read_text(encoding="utf-8")
          regras = (root / "REGRAS-INEGOCIAVEIS.md").read_text(encoding="utf-8")
          isolamento = (root / "docs/comum/isolamento-multi-tenant.md").read_text(encoding="utf-8")
          seguranca = (root / "docs/conformidade/comum/seguranca-dados.md").read_text(encoding="utf-8")
          diff = pathlib.Path("/tmp/diff.patch").read_text(encoding="utf-8", errors="replace")

          # Trunca diff muito grande pra caber no contexto (10k linhas ~ 200k tokens)
          if len(diff) > 400_000:
              diff = diff[:400_000] + "\n\n[... diff truncado em 400k chars ...]"

          user_msg = f"""## REGRAS-INEGOCIAVEIS.md
          {regras}

          ## docs/comum/isolamento-multi-tenant.md
          {isolamento}

          ## docs/conformidade/comum/seguranca-dados.md
          {seguranca}

          ## Diff a auditar (git diff base...HEAD)
          ```
          {diff}
          ```

          Aplique o prompt em system e devolva no formato exato."""

          resp = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=4096,
              system=system_prompt,
              messages=[{"role": "user", "content": user_msg}],
          )

          out = resp.content[0].text
          print(out)

          # Decide exit code pelo VEREDITO
          first_line = out.split("\n")[0].strip().upper()
          if "FAIL" in first_line:
              print("::error::Auditor de Segurança bloqueou — veja saída acima")
              sys.exit(1)
          if "CONCERNS" in first_line:
              print("::warning::Auditor de Segurança emitiu CONCERNS — revisar antes do merge")
          # PASS = 0
          sys.exit(0)
          EOF

      - name: Comentar resultado no PR
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1 — pin SHA SUPPLY-1 Onda PRE-A.4
        with:
          script: |
            const fs = require('fs');
            const body = `## Auditor de Segurança (Família 5)\n\nVeja log do step \`Invocar Auditor de Segurança\` no workflow run pra detalhes do veredito.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
