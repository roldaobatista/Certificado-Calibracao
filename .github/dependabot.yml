version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "roldaobatista"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "@trpc/server"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
