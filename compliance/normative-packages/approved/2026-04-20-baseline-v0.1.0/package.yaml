  - id: ISO-17025-CERTIFICATE-TEMPLATE
    title: 'Modelo de Certificado de Calibração'
    version: 'ISO/IEC 17025:2017 item 7.8'
    reference: 'iso 17025/04-templates/certificado-calibracao.md'
  - id: PORTARIA-INMETRO-157-2022
    title: 'Portaria Inmetro nº 157/2022'
    version: '2022'
    reference: 'normas e portarias inmetro/portarias/portaria-157-2022.md'
  - id: PORTARIA-INMETRO-289-2021
    title: 'Portaria Inmetro nº 289/2021'
    version: '2021'
    reference: 'normas e portarias inmetro/portarias/portaria-289-2021.md'
  - id: DOQ-CGCRE-LABORATORIOS
    title: 'Principais DOQ-CGCRE para Laboratórios de Calibração'
    version: 'watchlist 2026-04-19'
    reference: 'normas e portarias inmetro/doq-cgcre/principais-laboratorios.md'
  - id: NIT-DICLA-LABORATORIOS
    title: 'Principais NIT-DICLA para Laboratórios'
