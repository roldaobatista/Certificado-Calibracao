version: 1
source: harness/10-roadmap.md
policy:
  no_slice_starts_without_previous_gate: true
  release_norm_required: true
  validation_dossier_required: true
  normative_package_required: true
coverage:
  tracked_requirement_prefixes:
    - REQ-PRD-
  excluded_requirements:
    - REQ-PRD-13-18-VALIDATION-DOSSIER
    - REQ-PRD-13-19-AUDIT-HASH-CHAIN
    - REQ-PRD-13-19-TENANT-SQL-LINTER
    - REQ-PRD-13-19-WORM-STORAGE-CHECK
slices:
  - id: V1
    epic_id: EPIC-V1-FUNDACAO-TECNICA
    title: Fundação técnica
    depends_on: []
    estimated_duration_weeks: "4-6"
    release_norm_path: compliance/release-norm/v1.md
    validation_dossier_path: compliance/validation-dossier/releases/v1.md
    primary_agents:
      - backend-api
      - db-schema
      - web-ui
      - lgpd-security
    linked_requirements:
      - REQ-PRD-13-11-AUTH-SSO-MFA
      - REQ-PRD-13-12-ONBOARDING-WIZARD-BLOCKS
      - REQ-PRD-13-13-RLS-ISOLATION
      - REQ-HARNESS-P0-1-BACKEND-READINESS
    scope:
      - Banco, schema, migrações, seeds e contratos básicos do núcleo operacional.
      - Autenticação, sessão, RBAC e persistência reais no backend.
      - Ambiente local reprodutível com API, web, portal e dependências de runtime.
    exit_gates:
      - Migrações e seeds canônicos rodam limpos no ambiente local e em CI.
      - Login, sessão e RBAC reais funcionam com isolamento multitenant ativo.
      - APIs centrais deixam de depender de cenários estáticos para o núcleo operacional.
      - Dossiê V1 fechado em compliance/validation-dossier/releases/v1.md.
      - Release-norm V1 aprovado por product-governance.
      - Pacote normativo v1.0.0 assinado e em uso.
  - id: V2
    epic_id: EPIC-V2-CADASTROS-PRINCIPAIS
    title: Cadastros principais
    depends_on:
      - V1
    estimated_duration_weeks: "4-6"
    release_norm_path: compliance/release-norm/v2.md
    validation_dossier_path: compliance/validation-dossier/releases/v2.md
    primary_agents:
      - backend-api
      - web-ui
      - db-schema
    linked_requirements:
      - REQ-PRD-13-02-STANDARD-ELIGIBILITY-BLOCK
      - REQ-PRD-13-08-EQUIPMENT-CUSTOMER-ADDRESS
      - REQ-PRD-13-09-SIGNATORY-COMPETENCE-BLOCK
    scope:
      - CRUD real de clientes, equipamentos, padrões/pesos, procedimentos e usuários.
      - Vínculos obrigatórios entre cliente, endereço, equipamento, padrão e competência.
      - Busca, filtros básicos, arquivamento e trilha mínima de auditoria dos cadastros.
    exit_gates:
      - Todos os cadastros principais criam, editam, listam e arquivam dados reais no banco.
      - As regras de elegibilidade de padrão, vínculo de equipamento e competência ficam aplicadas sobre dados persistidos.
      - O back-office deixa de depender apenas de catálogos canônicos nos cadastros principais.
      - Dossiê V2 fechado em compliance/validation-dossier/releases/v2.md.
      - Release-norm V2 aprovado por product-governance.
      - Pacote normativo vigente anexado à fatia V2.
  - id: V3
    epic_id: EPIC-V3-FLUXO-OPERACIONAL-CENTRAL
    title: Fluxo operacional central
    depends_on:
      - V2
    estimated_duration_weeks: "6-8"
    release_norm_path: compliance/release-norm/v3.md
    validation_dossier_path: compliance/validation-dossier/releases/v3.md
    primary_agents:
      - backend-api
      - web-ui
      - db-schema
      - metrology-calc
    linked_requirements:
      - REQ-PRD-13-03-CERTIFICATE-MEASUREMENT-DECLARATIONS
      - REQ-PRD-13-04-TECHNICAL-REVIEW-SIGNATURE-AUDIT
      - REQ-PRD-13-06-CRITICAL-EVENT-AUDIT-TRAIL
      - REQ-PRD-13-14-SEQUENTIAL-NUMBERING
    scope:
      - Abertura e ciclo real da OS.
      - Revisão técnica, assinatura e emissão oficial do certificado.
      - Numeração sequencial, declaração metrológica, eventos críticos e persistência do fluxo ponta a ponta.
    exit_gates:
      - Existe caminho real ponta a ponta de OS até certificado emitido em ambiente controlado.
      - Revisão técnica, assinatura e audit trail rodam sobre dados persistidos e atores reais.
      - Numeração e declaração do certificado saem do fluxo operacional, não de cenários estáticos.
      - Dossiê V3 fechado em compliance/validation-dossier/releases/v3.md.
      - Release-norm V3 aprovado por product-governance.
      - Pacote normativo vigente anexado à fatia V3.
  - id: V4
    epic_id: EPIC-V4-PORTAL-E-EXTRAS
    title: Portal e extras
    depends_on:
      - V3
    estimated_duration_weeks: "6-8"
    release_norm_path: compliance/release-norm/v4.md
    validation_dossier_path: compliance/validation-dossier/releases/v4.md
    primary_agents:
      - backend-api
      - web-ui
      - android
      - lgpd-security
    linked_requirements:
      - REQ-PRD-13-01-MOBILE-OFFLINE-CALIBRATION
      - REQ-PRD-13-05-PUBLIC-QR-AUTHENTICITY
      - REQ-PRD-13-07-ANDROID-SYNC-IDEMPOTENCY
      - REQ-PRD-13-16-CONTROLLED-REISSUE
      - REQ-PRD-13-17-PUBLIC-QR-MINIMAL-METADATA
      - REQ-PRD-13-20-OFFLINE-SYNC-CHAOS
      - REQ-HARNESS-P1-1-SYNC-SIMULATOR
    scope:
      - Portal do cliente com dashboard, carteira de equipamentos e visualização do certificado.
      - Verificação pública por QR e reemissão controlada sobre certificados reais persistidos.
      - Canal mobile/offline e sync entram aqui como extensão operacional após o fechamento do fluxo central.
    exit_gates:
      - Portal do cliente opera sobre dados reais de equipamentos e certificados.
      - Verificação pública responde com metadados mínimos e autenticidade de certificados reais.
      - Reemissão controlada preserva histórico, QR anterior e trilha de aprovação.
      - O canal mobile/offline, quando habilitado, mantém matriz de conflitos e fila humana verdes no dossiê V4.
      - Dossiê V4 fechado em compliance/validation-dossier/releases/v4.md.
      - Release-norm V4 aprovado por product-governance.
      - Pacote normativo vigente anexado à fatia V4.
  - id: V5
    epic_id: EPIC-V5-QUALIDADE-E-REGULATORIO
    title: Qualidade e camadas regulatórias avançadas
    depends_on:
      - V4
    estimated_duration_weeks: "6-8"
    release_norm_path: compliance/release-norm/v5.md
    validation_dossier_path: compliance/validation-dossier/releases/v5.md
    primary_agents:
      - product-governance
      - regulator
      - backend-api
      - web-ui
      - qa-acceptance
      - legal-counsel
    linked_requirements:
      - REQ-PRD-13-10-SCOPE-CMC-BLOCK
      - REQ-PRD-13-15-REGULATORY-PROFILES-PDF
      - REQ-PRD-13-21-LEGAL-OPINION-DPA
      - REQ-PRD-13-22-NORMATIVE-GOVERNANCE-OWNER
    scope:
      - Módulo de Qualidade operando sobre OS, revisões, certificados e evidências reais.
      - Não conformidades, auditorias internas, indicadores, análise crítica e governança de release.
      - Camadas regulatórias avançadas, incluindo perfil Tipo A, escopo/CMC e pareceres formais.
    exit_gates:
      - Qualidade deixa de ser apenas leitura canônica e passa a operar sobre dados persistidos do núcleo.
      - Regras de perfil regulatório, escopo/CMC e pacote normativo ficam integradas ao fluxo real.
      - Auditoria interna dry-run e governança de release ficam arquivados no dossiê V5.
      - Product-governance libera V5 com pareceres necessários e pacote normativo vigente.
